<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy | Reflexiones</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d1d1;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 90%;
            margin-top: 80px;
        }
        header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        h1 {
            color: #ffffff;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }
        .post {
            margin-bottom: 50px;
        }
        .post-date {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
        }
        .post-title {
            color: #ffffff;
            margin: 10px 0;
            font-size: 1.4rem;
        }
        p {
            font-size: 1.1rem;
            color: #b0b0b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Willy's Log.</h1>
            <p style="font-size: 0.9rem; color: #555;">Living, unfortunately... but thinking a lot.</p>
        </header>

        <article class="post">
            <div class="post-date">26 de Abril, 2026</div>
            <h2 class="post-title">El inicio de la bitácora</h2>
            <p>
                Bienvenidos a mi rincón personal. Aquí no hay límites de caracteres ni algoritmos, 
                solo pensamientos crudos sobre la vida, el software y lo que surja en el camino.
            </p>
        </article>
    </div>
</body>
</html>
